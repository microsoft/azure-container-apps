id: compare-aca-vs-az-sandbox-ext
name: Compare — aca CLI vs az sandbox extension
description: 'Compare-style query. Skill activates. Explains: `aca` is the primary CLI (richer surface,
  YAML manifest support, label selectors, faster updates). `az sandbox` extension is for users already
  deep in az CLI workflow (auth/profile reuse, scriptable from existing az scripts) but lags behind aca
  on feature surface. Should reference the side-by-side table in SKILL.md.'
