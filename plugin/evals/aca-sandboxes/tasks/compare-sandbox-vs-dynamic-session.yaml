id: compare-sandbox-vs-dynamic-session
name: Compare — Sandbox vs Dynamic Session (CRITICAL)
description: 'Compare-style query. Skill MUST activate AND correctly explain the difference per public
  docs/early/sandboxes-overview.md lines 163-177: ACA Sandboxes = developer-owned, long-lived (hours-days),
  direct programmable control, microVM, YAML/CLI driven, intended for dev loops and personal agents. Container
  Apps Dynamic Sessions = managed code-interpreter, ephemeral (seconds-minutes), Hyper-V isolation, intended
  for LLM tool execution / untrusted code. Must include the comparison table. Must NOT conflate them.'
tags:
- compare
- dynamic-sessions
- disambiguation
- critical
inputs:
  prompt: What's the difference between ACA Sandboxes and Container Apps Dynamic Sessions?
expected:
  should_trigger: true
graders:
- type: prompt
  name: behavior-compare-sandbox-vs-dynamic-session
  config:
    prompt: 'The user asked: "What''s the difference between ACA Sandboxes and Container Apps Dynamic
      Sessions?"


      Compare-style query. Skill MUST activate AND correctly explain the difference per public docs/early/sandboxes-overview.md
      lines 163-177: ACA Sandboxes = developer-owned, long-lived (hours-days), direct programmable control,
      microVM, YAML/CLI driven, intended for dev loops and personal agents. Container Apps Dynamic Sessions
      = managed code-interpreter, ephemeral (seconds-minutes), Hyper-V isolation, intended for LLM tool
      execution / untrusted code. Must include the comparison table. Must NOT conflate them.


      Note on ambiguity: Highest-stakes comparison — these are DIFFERENT products.


      If the response follows the expected behavior described above, call set_waza_grade_pass.


      If it fails to meet the expected behavior, call set_waza_grade_fail.'
    continue_session: true
