id: pos-yaml-init
name: Scaffold Starter sandbox.yaml
description: Skill activates. Runs `aca sandbox init` (or shows it). Explains the generated manifest includes
  group, id, disk, ports, env, labels. Mentions `aca sandbox schema` to dump the full schema for editor
  autocompletion.
tags:
- positive
- yaml
- init
- scaffold
inputs:
  prompt: Generate a starter sandbox manifest for me
expected:
  should_trigger: true
graders:
- type: prompt
  name: behavior-pos-yaml-init
  config:
    prompt: 'The user asked: "Generate a starter sandbox manifest for me"


      Skill activates. Runs `aca sandbox init` (or shows it). Explains the generated manifest includes
      group, id, disk, ports, env, labels. Mentions `aca sandbox schema` to dump the full schema for editor
      autocompletion.


      If the response follows the expected behavior described above, call set_waza_grade_pass.


      If it fails to meet the expected behavior, call set_waza_grade_fail.'
    continue_session: true
