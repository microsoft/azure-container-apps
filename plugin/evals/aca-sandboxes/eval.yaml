name: aca-sandboxes-eval
description: >-
  Eval suite for the `aca-sandboxes` skill — measures routing accuracy,
  CLI command correctness, install-path selection, portal-URL accuracy,
  gotcha handling, and naming-policy compliance (ACA Sandboxes vs.
  Dynamic Sessions disambiguation).
skill: aca-sandboxes
version: "0.1"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: true
  workers: 4
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: routing_accuracy
    weight: 0.25
    threshold: 0.90
    description: >-
      Skill correctly activates for ACA Sandboxes / microVM / sandbox-group
      queries and correctly rejects out-of-scope queries (Azure Functions,
      Container Apps deploys, AKS pods, Container Registry, Cosmos, App Service,
      and — critically — Dynamic Sessions queries).

  - name: cli_command_correctness
    weight: 0.25
    threshold: 0.90
    description: >-
      `aca` CLI commands use correct verbs and flags from the 1.0.0-beta.1
      surface: `aca sandboxgroup create --location` (NOT `--region`),
      `aca sandbox create --group --id --disk`, label selectors `-l name=`,
      `aca sandbox port add --port --email`, `aca sandbox apply -f sandbox.yaml`,
      `aca sandbox shell -l name=`.

  - name: install_path_selection
    weight: 0.15
    threshold: 0.85
    description: >-
      Picks `aca` CLI as the primary install path (curl install script per
      platform). Falls back to `az sandbox` extension or `adc-api.js` Node
      helper only when explicitly requested or when an agent fan-out pattern
      is needed. Notes Python SDK as "coming soon" rather than guessing.

  - name: portal_url_correctness
    weight: 0.10
    threshold: 0.95
    description: >-
      Uses `https://containerapps.azure.com/sandbox-groups` for portal
      links. Does NOT use legacy `portal.agentdevcompute.io` or fabricated
      hostnames. References `dynamicsessions.io` only as a footnoted
      internal implementation detail (never as a customer-facing endpoint).

  - name: gotcha_handling
    weight: 0.15
    threshold: 0.85
    description: >-
      Applies key gotchas from SKILL.md: prefers Entra-ID email for port
      auth (softened — "for some accounts" alias may not work), warns about
      personal-connector port-order issues, mentions auto-suspend behavior,
      uses snapshot before destroying, and explicitly disambiguates Dynamic
      Sessions when the user query is adjacent.

  - name: naming_policy
    weight: 0.10
    threshold: 0.90
    description: >-
      Uses "ACA Sandboxes" or "Azure Container Apps sandboxes" in customer-
      facing prose. Uses "ADC" / "Agent Dev Compute" only when referring to
      the internal codename or `adc-devx` repo. Never conflates ACA Sandboxes
      with Container Apps Dynamic Sessions.

graders:
  - type: behavior
    name: token-budget
    config:
      max_tokens: 800000

tasks:
  - "tasks/*.yaml"
