id: compare-aca-vs-portal
name: Compare — aca CLI vs Portal
description: 'Compare-style query. Skill activates. Explains: `aca` is the primary CLI (scriptable,
  CI/CD-friendly, YAML manifest support, label selectors `-l name=`). The portal at containerapps.azure.com/sandbox-groups
  is for exploration, one-off ops, and quick visual inspection of sandbox state, logs, and ports.
  Most flows are available in both. The portal is NOT a substitute for the CLI in agent or CI scenarios.'
tags:
- compare
- cli
- portal
inputs:
  prompt: Should I use the aca CLI or the portal to manage my sandboxes?
expected:
  should_trigger: true
graders:
