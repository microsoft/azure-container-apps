id: pos-ssh-into-sandbox
name: SSH Into Sandbox
description: Skill activates. Leads with `aca sandbox shell -l name=<sb>` (FIRST option — uses the `aca`
  CLI's built-in WebSocket shell). Mentions the portal terminal as option 2. Does NOT suggest opening
  port 22 directly, `ssh -i`, or any keypair-based SSH.
tags:
- positive
- ssh
- shell
- access
inputs:
  prompt: SSH into my sandbox
expected:
  should_trigger: true
graders:
- type: prompt
  name: behavior-pos-ssh-into-sandbox
  config:
    prompt: 'The user asked: "SSH into my sandbox"


      Skill activates. Leads with `aca sandbox shell -l name=<sb>` (FIRST option — uses the `aca` CLI''s
      built-in WebSocket shell). Mentions the portal terminal as option 2. Does NOT suggest opening
      port 22 directly, `ssh -i`, or any keypair-based SSH.


      If the response follows the expected behavior described above, call set_waza_grade_pass.


      If it fails to meet the expected behavior, call set_waza_grade_fail.'
    continue_session: true
