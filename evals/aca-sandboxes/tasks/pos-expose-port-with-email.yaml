id: pos-expose-port-with-email
name: Expose Port With Entra Email Auth
description: 'Skill activates. Uses `aca sandbox port add -l name=<sb> --port 3000 --email <user>@microsoft.com`.
  CRITICAL gotcha: for some accounts the alias does NOT work — must use the full Entra-ID email. Should
  mention this explicitly. Should NOT suggest SSH port 22 — direct user to `aca sandbox shell` instead.'
tags:
- positive
- port
- auth
- entra
- gotcha
inputs:
  prompt: Expose port 3000 on my sandbox locked down to my Entra ID
expected:
  should_trigger: true
