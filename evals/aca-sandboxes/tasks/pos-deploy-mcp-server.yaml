id: pos-deploy-mcp-server
name: Deploy MCP Server To Sandbox
description: 'Skill activates. References the Personal Agent template path: creates a sandbox with appropriate
  disk (`claude` or `copilot`), runs MCP server inside, exposes its port via `aca sandbox port add`. Mentions
  Instance Network Proxy at 100.64.100.1 for MCP discovery from agent host. References the available MCP
  tools table.'
tags:
- positive
- mcp
- deploy
- personal-agent
inputs:
  prompt: Deploy an MCP server in my sandbox
expected:
  should_trigger: true
graders:
- type: prompt
  name: behavior-pos-deploy-mcp-server
  config:
    prompt: 'The user asked: "Deploy an MCP server in my sandbox"


      Skill activates. References the Personal Agent template path: creates a sandbox with appropriate
      disk (`claude` or `copilot`), runs MCP server inside, exposes its port via `aca sandbox port add`.
      Mentions Instance Network Proxy at 100.64.100.1 for MCP discovery from agent host. References the
      available MCP tools table.


      If the response follows the expected behavior described above, call set_waza_grade_pass.


      If it fails to meet the expected behavior, call set_waza_grade_fail.'
    continue_session: true
